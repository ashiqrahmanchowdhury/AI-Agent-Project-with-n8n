<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Article Analyzer</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0f14;
      color: #e8eaf0;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(108,99,255,0.15);
      border: 1px solid #6c63ff;
      border-radius: 999px;
      padding: 4px 14px;
      font-size: 12px;
      color: #6c63ff;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    .header {
      text-align: center;
      margin-bottom: 2rem;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    h1 span { color: #6c63ff; }

    .subtitle {
      margin-top: 0.5rem;
      color: #7b82a0;
      font-size: 0.9rem;
    }

    .card {
      background: #161a24;
      border: 1px solid #252a38;
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 480px;
    }

    .field { margin-bottom: 1.2rem; }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #7b82a0;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      background: #0d0f14;
      border: 1px solid #252a38;
      border-radius: 10px;
      padding: 10px 14px;
      color: #e8eaf0;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: #6c63ff;
      box-shadow: 0 0 0 3px rgba(108,99,255,0.15);
    }

    input::placeholder { color: #3d4460; }

    button {
      width: 100%;
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 4px;
      transition: opacity 0.2s;
    }

    button:hover:not(:disabled) { opacity: 0.88; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .spin {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #result {
      margin-top: 1rem;
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 13px;
      display: none;
      line-height: 1.6;
    }
    #result.ok  { background: rgba(34,197,94,0.1);  border: 1px solid rgba(34,197,94,0.3);  color: #86efac; }
    #result.err { background: rgba(239,68,68,0.1);  border: 1px solid rgba(239,68,68,0.3);  color: #fca5a5; }

    .sid {
      font-family: monospace;
      font-size: 11px;
      color: #7b82a0;
      margin-top: 4px;
    }

    .steps {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      margin-top: 1.2rem;
    }

    .step {
      background: #0d0f14;
      border: 1px solid #252a38;
      border-radius: 8px;
      padding: 8px 4px;
      text-align: center;
      font-size: 10px;
      color: #7b82a0;
      line-height: 1.4;
    }

    .step .ico { font-size: 18px; display: block; margin-bottom: 3px; }

    footer {
      margin-top: 1.5rem;
      color: #3d4460;
      font-size: 12px;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="badge">⚡ n8n · FastAPI · AI</div>
    <h1>Article <span>Analyzer</span></h1>
    <p class="subtitle">Paste any article URL — get AI summary & insights in your inbox.</p>
  </div>

  <div class="card">
    <div class="field">
      <label for="email">Your Email</label>
      <input type="email" id="email" placeholder="ashiq@example.com" />
    </div>

    <div class="field">
      <label for="articleUrl">Article URL</label>
      <input type="url" id="articleUrl" placeholder="https://techcrunch.com/2024/..." />
    </div>

    <button id="btn" onclick="submitForm()">
      <span id="btxt">Analyze Article</span>
      <div class="spin" id="spin"></div>
    </button>

    <div id="result"></div>

    <div class="steps">
      <div class="step"><span class="ico">🌐</span>Scrape</div>
      <div class="step"><span class="ico">✍️</span>Summarize</div>
      <div class="step"><span class="ico">💡</span>Insights</div>
      <div class="step"><span class="ico">📊</span>Sheets</div>
      <div class="step"><span class="ico">📧</span>Email</div>
    </div>
  </div>

  <footer>Module 21 · AI Agents Assignment</footer>

  <script>
    // ⚠️ Backend URL — local এ এটাই রাখো
    const BACKEND_URL = "http://localhost:8000";

    async function submitForm() {
      const email = document.getElementById("email").value.trim();
      const url = document.getElementById("articleUrl").value.trim();
      const btn = document.getElementById("btn");
      const btxt = document.getElementById("btxt");
      const spin = document.getElementById("spin");
      const result = document.getElementById("result");

      if (!email || !url) {
        show("err", "⚠️ Email এবং Article URL দুটোই দিতে হবে।");
        return;
      }
      if (!url.startsWith("http")) {
        show("err", "⚠️ URL অবশ্যই http:// দিয়ে শুরু হতে হবে।");
        return;
      }

      btn.disabled = true;
      btxt.textContent = "Processing...";
      spin.style.display = "block";
      result.style.display = "none";

      try {
        const res = await fetch(`${BACKEND_URL}/analyze`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, article_url: url }),
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || "কিছু একটা ভুল হয়েছে।");

        show("ok", `✅ Article process হচ্ছে! একটু পরে email চেক করো। 📧<div class="sid">Session ID: ${data.session_id}</div>`);
        document.getElementById("email").value = "";
        document.getElementById("articleUrl").value = "";

      } catch (err) {
        show("err", "❌ Error: " + err.message);
      } finally {
        btn.disabled = false;
        btxt.textContent = "Analyze Article";
        spin.style.display = "none";
      }
    }

    function show(type, msg) {
      const r = document.getElementById("result");
      r.className = type;
      r.style.display = "block";
      r.innerHTML = msg;
    }

    document.addEventListener("keydown", e => {
      if (e.key === "Enter") submitForm();
    });
  </script>
</body>
</html>
